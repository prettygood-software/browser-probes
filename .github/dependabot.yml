version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
